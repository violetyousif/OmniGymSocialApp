<ion-content class="register-container">
  <div class="background-container">
    <div class="grey-background"></div>
    <div class="orange-oval"></div>
    <div class="white-oval"></div>
  </div>

  <div class="register-box">
    <div class="logo-container">
      <img src="assets/OrangeLogo.PNG" alt="OmniGym Logo" class="logo-image" />
    </div>

    <h2 class="title">Register Gym</h2>

    <form #registerForm="ngForm" (ngSubmit)="submitForm(registerForm)">
      <!-- State Dropdown -->
      <div class="input-container">
        <label for="state">State <span class="required">*</span></label>
        <select id="state" name="state" class="input-field" [(ngModel)]="state" required #stateField="ngModel">
          <option value="" disabled selected>Select State</option>
          <option *ngFor="let state of states" [value]="state">{{ state }}</option>
        </select>
        <p class="error-message" *ngIf="(stateField.invalid && stateField.touched) || (registerForm.submitted && stateField.invalid)">State is required.</p>
      </div>

      <!-- Gym Dropdown -->
      <div class="input-container">
        <label for="gym">Gym <span class="required">*</span></label>
        <select id="gym" name="gym" class="input-field" [(ngModel)]="gym" required #gymField="ngModel">
          <option value="" disabled selected>Select Gym</option>
          <option *ngFor="let gym of gyms" [value]="gym">{{ gym }}</option>
          <option value="other">Other</option>
        </select>
        <p class="error-message" *ngIf="(gymField.invalid && gymField.touched) || (registerForm.submitted && gymField.invalid)">Gym is required.</p>
      </div>

      <!-- Location Input (Optional) -->
      <div class="input-container">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" class="input-field" [(ngModel)]="location" placeholder="Enter area" />
      </div>

      <!-- Membership ID Input -->
      <div class="input-container">
        <label for="membership">Membership ID <span class="required">*</span></label>
        <input type="text" id="membership" name="membership" class="input-field" [(ngModel)]="membership" required #membershipField="ngModel" placeholder="Gym Membership ID" />
        <p class="error-message" *ngIf="(membershipField.invalid && membershipField.touched) || (registerForm.submitted && membershipField.invalid)">Membership ID is required.</p>
      </div>

      <!-- Buttons -->
      <div class="button-container">
        <ion-button expand="full" class="submit-button" type="submit" (click)="submitForm(registerForm)">
          Submit
        </ion-button>
        <ion-button class="previous-button" fill="clear" routerLink="/login">← Previous</ion-button>
      </div>
    </form>
  </div>
</ion-content>
