<ion-content class="register-container">
  <!-- Background Layers -->
  <div class="background-container">
    <div class="grey-background"></div>
    <div class="orange-oval"></div>
    <div class="white-oval"></div>
  </div>

  <!-- Logo -->
  <div class="logo-container">
    <img src="assets/OrangeLogo.png" alt="OmniGym Logo" class="logo-image" />
  </div>

  <!-- Registration Form -->
  <div class="register-box">
    <h2 class="title">Create Account</h2>

    <form #registerForm="ngForm">
      <!-- Email Input -->
      <div class="input-container">
        <label for="email">Email <span class="required">*</span></label>
        <input type="email" id="email" class="input-field" placeholder="your.email@example.com" required [(ngModel)]="user.email" name="email" #email="ngModel" />
        <p class="error-message" *ngIf="email.invalid && email.touched">Email is required</p>
      </div>

      <!-- Password Input -->
      <div class="input-container">
        <label for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" class="input-field" placeholder="Enter your password" required [(ngModel)]="user.password" name="password" #password="ngModel" />
        <p class="error-message" *ngIf="password.invalid && password.touched">Password is required</p>
      </div>

      <!-- First Name Field -->
      <div class="input-container">
        <label for="first-name">First Name <span class="required">*</span></label>
        <input type="text" id="first-name" class="input-field" placeholder="First Name" [(ngModel)]="user.firstName" name="firstName" #firstName="ngModel"required/>
        <p class="error-message" *ngIf="firstName.invalid && firstName.touched">First name is required</p>
      </div>

      <!-- Last Name Field -->
      <div class="input-container">
        <label for="last-name">Last Name <span class="required">*</span></label>
        <input type="text" id="last-name" class="input-field" placeholder="Last Name" [(ngModel)]="user.lastName" name="lastName" #lastName="ngModel"required/>
        <p class="error-message" *ngIf="lastName.invalid && lastName.touched">Last name is required</p>
      </div>

      <!-- Birth Date -->
      <div class="input-container">
        <label for="birth-date">Birth Date <span class="required">*</span></label>
        <input type="date" id="birth-date" class="input-field" required [(ngModel)]="user.birthDate" name="birthDate" #birthDate="ngModel" />
        <p class="error-message" *ngIf="birthDate.invalid && birthDate.touched">Birth date is required</p>
      </div>

      <!-- Phone Number -->
      <div class="input-container">
        <label for="phone-number">Phone Number <span class="required">*</span></label>
        <input type="tel" id="phone-number" class="input-field" placeholder="222-222-2222" required [(ngModel)]="user.phone" name="phone" #phone="ngModel" />
        <p class="error-message" *ngIf="phone.invalid && phone.touched">Phone number is required</p>
      </div>

      <!-- Gender Selection -->
      <div class="input-container">
        <label for="gender">Gender <span class="required">*</span></label>
        <select id="gender" class="input-field" required [(ngModel)]="user.gender" name="gender" #gender="ngModel">
          <option value="" disabled selected>Gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
        <p class="error-message" *ngIf="gender.invalid && gender.touched">Gender is required</p>
      </div>

      <!-- Agree to Terms -->
      <div class="checkbox-container">
        <input type="checkbox" id="terms" required [(ngModel)]="user.agreeTerms" name="agreeTerms" #agreeTerms="ngModel" />
        <label for="terms">Agree to terms <span class="required">*</span></label>
        <p class="error-message" *ngIf="agreeTerms.invalid && agreeTerms.touched">You must agree to the terms</p>
      </div>

      <!-- Submit & Previous Buttons -->
      <div class="button-container">
        <ion-button expand="full" class="submit-button" [disabled]="registerForm.invalid" (click)="navigateToNextPage()">
          Submit
        </ion-button>
        <ion-button expand="full" fill="outline" class="previous-button" (click)="navigateToPrevious()">← Previous</ion-button>
      </div>
    </form>
  </div>
</ion-content>
